name: Sync GitBook to Dify

on:
  push:
    branches: [main]
    paths:
      - '**.md'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Enable long paths
        run: git config --global core.longpaths true

      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Get changed markdown files
        run: |
          git diff --name-only HEAD~1 HEAD | grep '\.md$' > changed_files.txt || true
          # workflow_dispatch時は全ファイルを対象にする
          if [ ! -s changed_files.txt ]; then
            find . -name '*.md' | sed 's|^\./||' > changed_files.txt
          fi
          cat changed_files.txt

      - name: Upload or Update to Dify
        env:
          DIFY_API_KEY: ${{ secrets.DIFY_API_KEY }}
          DIFY_DATASET_ID: ${{ secrets.DIFY_DATASET_ID }}
        run: |
          while IFS= read -r file; do
            # ファイル名が長い場合はMD5ハッシュを使う
            FILENAME=$(basename "$file")
            BYTE_LEN=$(echo -n "$FILENAME" | wc -c)
            if [ "$BYTE_LEN" -gt 200 ]; then
              LOOKUP_NAME=$(echo -n "$FILENAME" | md5sum | cut -d' ' -f1).md
            else
              LOOKUP_NAME="$FILENAME"
            fi

            echo "Processing: $FILENAME → $LOOKUP_NAME"

            DOC_ID=$(curl -s "https://api.dify.ai/v1/datasets/${DIFY_DATASET_ID}/documents?limit=100" \
              -H "Authorization: Bearer ${DIFY_API_KEY}" | \
              python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          docs = data.get('data', [])
          for d in docs:
              if d.get('name') == '${LOOKUP_NAME}':
                  print(d['id'])
                  break
          ")

            if [ -n "$DOC_ID" ]; then
              curl -X POST "https://api.dify.ai/v1/datasets/${DIFY_DATASET_ID}/documents/${DOC_ID}/update-by-file" \
                -H "Authorization: Bearer ${DIFY_API_KEY}" \
                -F "file=@${file};type=text/markdown" \
                -F 'data={"indexing_technique":"high_quality","process_rule":{"mode":"automatic"}}'
            else
              curl -X POST "https://api.dify.ai/v1/datasets/${DIFY_DATASET_ID}/document/create-by-file" \
                -H "Authorization: Bearer ${DIFY_API_KEY}" \
                -F "file=@${file};type=text/markdown" \
                -F 'data={"indexing_technique":"high_quality","process_rule":{"mode":"automatic"}}'
            fi
          done < changed_files.txt
