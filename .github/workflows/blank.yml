name: Sync GitBook to Dify

on:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Debug API Key
        env:
          DIFY_API_KEY: ${{ secrets.DIFY_API_KEY }}
          DIFY_DATASET_ID: ${{ secrets.DIFY_DATASET_ID }}
        run: |
          python3 - << 'PYEOF'
          import os
          key = os.environ["DIFY_API_KEY"]
          did = os.environ["DIFY_DATASET_ID"]
          print(f"KEY length: {len(key)}")
          print(f"KEY bytes: {key.encode()[:20]}")
          print(f"DID length: {len(did)}")
          print(f"DID bytes: {did.encode()[:40]}")
          PYEOF
