- name: Sync via GitHub API
        env:
          DIFY_API_KEY: ${{ secrets.DIFY_API_KEY }}
          DIFY_DATASET_ID: ${{ secrets.DIFY_DATASET_ID }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          python3 << 'EOF'
          import os, json, requests, hashlib

          DIFY_API_KEY = os.environ["DIFY_API_KEY"]
          DIFY_DATASET_ID = os.environ["DIFY_DATASET_ID"]

          # デバッグ：キーの長さと末尾の文字コードを確認
          print(f"API KEY長さ: {len(DIFY_API_KEY)}")
          print(f"API KEYバイト列: {DIFY_API_KEY.encode()[:15]}")
          print(f"DATASET ID長さ: {len(DIFY_DATASET_ID)}")
